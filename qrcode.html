<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码生成 · 镜华录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1410;color:#f7f2ec;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#2c2416;border-radius:12px;padding:40px;text-align:center;max-width:480px;width:100%;border:1px solid rgba(196,149,106,0.12)}
.card h2{font-size:18px;letter-spacing:3px;color:#c4956a;margin-bottom:6px;font-weight:500}
.card .sub{font-size:12px;color:rgba(247,242,236,0.3);letter-spacing:2px;margin-bottom:24px}
.qr-wrap{background:#fff;padding:20px;border-radius:8px;display:inline-block;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,0.3)}
.qr-wrap canvas{display:block;margin:0 auto;width:280px;height:280px}
.qr-label{font-size:14px;letter-spacing:3px;color:#c4956a;margin-top:8px}
.qr-label span{color:rgba(247,242,236,0.2);font-size:11px;letter-spacing:1px}
.btn{display:inline-block;padding:10px 28px;background:#c4956a;color:#1a1410;border:none;border-radius:4px;font-size:13px;letter-spacing:1px;cursor:pointer;font-family:inherit;font-weight:500;margin-top:16px;text-decoration:none;transition:.3s}
.btn:hover{background:#d4a57a}
.btn2{background:transparent;border:1px solid rgba(196,149,106,0.3);color:rgba(247,242,236,0.5);margin-left:8px}
.btn2:hover{background:rgba(196,149,106,0.1);color:#c4956a}
@media(max-width:480px){.card{padding:24px}.qr-wrap canvas{width:220px;height:220px}}
</style>
</head>
<body>
<div class="card">
<h2>镜华录</h2>
<div class="sub">长按或截图保存二维码</div>
<div class="qr-wrap">
<div id="qrContainer"></div>
<div class="qr-label">扫 码 浏 览 作 品 集</div>
</div>
<div>
<button class="btn" id="saveBtn">下载高清二维码</button>
<button class="btn btn2" onclick="location.reload()">重新生成</button>
</div>
</div>
<script>
const URL = "https://490912195.github.io";

function drawQR() {
  const container = document.getElementById("qrContainer");
  container.innerHTML = "";

  // Load QR image from API
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = "https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=10&data=" + encodeURIComponent(URL);
  
  img.onload = function() {
    // Create canvas for styled QR
    const canvas = document.createElement("canvas");
    canvas.width = 400;
    canvas.height = 480;
    const ctx = canvas.getContext("2d");

    // Background
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, 400, 480);

    // Gold border frame
    ctx.strokeStyle = "#c4956a";
    ctx.lineWidth = 3;
    ctx.strokeRect(8, 8, 384, 464);

    // Inner thin line
    ctx.strokeStyle = "rgba(196,149,106,0.3)";
    ctx.lineWidth = 1;
    ctx.strokeRect(16, 16, 368, 448);

    // Draw QR at top
    ctx.drawImage(img, 30, 30, 340, 340);

    // Decorative corners
    function drawCorner(x, y) {
      ctx.strokeStyle = "#c4956a";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(x, y + 20);
      ctx.lineTo(x, y);
      ctx.lineTo(x + 20, y);
      ctx.stroke();
    }
    drawCorner(24, 24);
    drawCorner(376, 24);
    drawCorner(24, 376);
    drawCorner(376, 376);

    // Bottom text
    ctx.fillStyle = "#8b5e3c";
    ctx.font = '14px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.textAlign = "center";
    ctx.fillText("镜 华 录 · 作 品 集", 200, 420);

    ctx.fillStyle = "rgba(139,94,60,0.4)";
    ctx.font = '10px "PingFang SC","Microsoft YaHei",sans-serif';
    ctx.fillText("扫码浏览 · 随时查看最新作品", 200, 448);

    // Add to page
    container.appendChild(canvas);

    // Download button
    document.getElementById("saveBtn").onclick = function() {
      const link = document.createElement("a");
      link.download = "作品集二维码.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    };
  };

  img.onerror = function() {
    container.innerHTML = '<div style="padding:40px;color:#666">加载失败，请刷新页面重试</div>';
  };
}

drawQR();
</script>
</body>
</html>
